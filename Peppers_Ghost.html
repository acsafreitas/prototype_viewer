<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pepper's Ghost — Visualizador de Protótipos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00e5ff;
      --cyan-dim: rgba(0, 229, 255, 0.18);
      --cyan-glow: rgba(0, 229, 255, 0.45);
      --bg: #030a0f;
      --panel: rgba(4, 18, 28, 0.92);
      --border: rgba(0, 229, 255, 0.22);
      --text: #c8f0f8;
      --muted: rgba(200, 240, 248, 0.45);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    .corner {
      position: fixed;
      width: 32px; height: 32px;
      z-index: 9997;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--cyan);
    }
    .corner::before { width: 2px; height: 100%; }
    .corner::after  { width: 100%; height: 2px; }
    .corner.tl { top: 16px; left: 16px; }
    .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: linear-gradient(to bottom, rgba(3,10,15,0.95) 70%, transparent);
    }

    #header .logo { display: flex; flex-direction: column; gap: 2px; }
    #header .logo-title {
      font-size: 18px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--cyan); text-shadow: 0 0 16px var(--cyan-glow);
    }
    #header .logo-sub {
      font-size: 10px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--muted);
    }

    #switcher { display: flex; gap: 8px; }

    .sw-btn {
      position: relative;
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      overflow: hidden;
    }
    .sw-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--cyan-dim);
      opacity: 0; transition: opacity 0.25s;
    }
    .sw-btn:hover::before { opacity: 1; }
    .sw-btn:hover { color: var(--cyan); border-color: var(--cyan); }
    .sw-btn.active {
      color: var(--cyan); border-color: var(--cyan);
      background: var(--cyan-dim);
      text-shadow: 0 0 8px var(--cyan-glow);
    }
    .sw-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 40%; height: 2px;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
    }

    model-viewer {
      width: 100vw; height: 100vh;
      background-color: transparent;
      --poster-color: transparent;
      --progress-bar-color: var(--cyan);
    }

    #info {
      position: fixed; bottom: 32px; left: 28px;
      z-index: 200;
      display: flex; flex-direction: column; gap: 6px;
    }
    .info-row {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .info-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    #controls {
      position: fixed; bottom: 32px; right: 28px;
      z-index: 200;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    .ctrl-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .ctrl-key {
      padding: 2px 7px;
      border: 1px solid var(--border); border-radius: 3px;
      font-size: 10px; color: var(--cyan); background: var(--panel);
    }

    #loading {
      position: fixed; inset: 0;
      background: var(--bg); z-index: 9000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .load-title {
      font-size: 13px; letter-spacing: 6px;
      text-transform: uppercase; color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow);
    }
    .load-bar-wrap {
      width: 220px; height: 2px;
      background: rgba(0,229,255,0.12); border-radius: 2px; overflow: hidden;
    }
    .load-bar {
      height: 100%; background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
      animation: loadanim 1.6s ease-in-out infinite;
    }
    @keyframes loadanim {
      0%   { width: 0%;  margin-left: 0%; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%;  margin-left: 100%; }
    }
    .load-sub {
      font-size: 10px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--muted);
    }

    #modelBadge {
      position: fixed; top: 50%; right: 28px;
      transform: translateY(-50%);
      z-index: 200;
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
      pointer-events: none;
    }
    #modelBadge .badge-label {
      font-size: 9px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--muted);
    }
    #modelBadge .badge-name {
      font-size: 22px; font-weight: 700; letter-spacing: 2px;
      color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow); text-align: right;
    }
    #modelBadge .badge-line {
      width: 100%; height: 1px;
      background: linear-gradient(to left, var(--cyan), transparent); margin-top: 4px;
    }

    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(3,10,15,0.7) 100%);
      pointer-events: none; z-index: 100;
    }

    @media (max-width: 600px) {
      #header { padding: 12px 16px; }
      #header .logo-title { font-size: 14px; letter-spacing: 2px; }
      .sw-btn { padding: 7px 12px; font-size: 11px; }
      #controls { display: none; }
      #modelBadge .badge-name { font-size: 16px; }
      #info { bottom: 20px; left: 16px; }
      #modelBadge { right: 16px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="load-title">Inicializando</div>
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
  <div class="load-sub">Pepper's Ghost — Visualizador 3D</div>
</div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div id="vignette"></div>

<div id="header">
  <div class="logo">
    <div class="logo-title">Pepper's Ghost</div>
    <div class="logo-sub">Visualizador de Protótipos</div>
  </div>
  <div id="switcher">
    <button class="sw-btn active" onclick="loadModel(0, this)">Protótipo 01</button>
    <button class="sw-btn"        onclick="loadModel(1, this)">Protótipo 02</button>
  </div>
</div>

<div id="modelBadge">
  <div class="badge-label">Modelo activo</div>
  <div class="badge-name" id="badgeName">PROTÓTIPO 01</div>
  <div class="badge-line"></div>
</div>

<div id="info">
  <div class="info-row"><div class="info-dot"></div>Sistema online</div>
  <div class="info-row" id="infoFile" style="color:rgba(200,240,248,0.25);font-size:10px;">Protótipo_1.glb</div>
</div>

<div id="controls">
  <div class="ctrl-row"><span class="ctrl-key">drag</span> Rodar</div>
  <div class="ctrl-row"><span class="ctrl-key">scroll</span> Zoom</div>
</div>

<model-viewer
  id="viewer"
  camera-controls
  disable-pan
  auto-rotate
  auto-rotate-delay="1000"
  rotation-per-second="12deg"
  min-field-of-view="15deg"
  max-field-of-view="55deg"
  exposure="1.8"
  shadow-intensity="0.4"
  shadow-softness="1"
  tone-mapping="commerce"
  environment-image="legacy">
</model-viewer>
