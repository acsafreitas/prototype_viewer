<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pepper's Ghost — Visualizador de Protótipos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #f0ede8;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #1a1a1a;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: transparent;
      --poster-color: transparent;
      --progress-bar-color: #555;
    }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: rgba(240, 237, 232, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
    }

    #header .logo-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #1a1a1a;
    }
    #header .logo-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    #switcher { display: flex; gap: 8px; }

    .sw-btn {
      padding: 8px 20px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      background: white;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sw-btn:hover {
      background: #e8e4de;
      color: #1a1a1a;
      border-color: rgba(0,0,0,0.25);
    }
    .sw-btn.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }

    #info {
      position: fixed;
      bottom: 24px; left: 28px;
      z-index: 200;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    #controls {
      position: fixed;
      bottom: 24px; right: 28px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }
    .ctrl-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; color: #aaa;
    }
    .ctrl-key {
      padding: 2px 7px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 4px;
      font-size: 10px;
      background: white;
      color: #555;
    }

    @media (max-width: 600px) {
      #header { padding: 12px 16px; }
      .sw-btn { padding: 7px 14px; font-size: 12px; }
      #controls { display: none; }
      #info { left: 16px; bottom: 16px; }
    }
  </style>
</head>
<body>

<div id="header">
  <div>
    <div class="logo-title">Pepper's Ghost</div>
    <div class="logo-sub">Visualizador de Protótipos</div>
  </div>
  <div id="switcher">
    <button class="sw-btn active" onclick="loadModel(0, this)">Protótipo 1</button>
    <button class="sw-btn"        onclick="loadModel(1, this)">Protótipo 2</button>
  </div>
</div>

<div id="info">Protótipo_1.glb</div>

<div id="controls">
  <div class="ctrl-row"><span class="ctrl-key">drag</span> Rodar</div>
  <div class="ctrl-row"><span class="ctrl-key">scroll</span> Zoom</div>
</div>

<model-viewer
  id="viewer"
  camera-controls
  disable-pan
  auto-rotate
  auto-rotate-delay="800"
  rotation-per-second="10deg"
  min-field-of-view="15deg"
  max-field-of-view="60deg"
  exposure="1.6"
  shadow-intensity="1"
  shadow-softness="0.8"
  tone-mapping="commerce"
  environment-image="legacy">
</model-viewer>

<script>
  const models = [
    { file: "Protótipo_1.glb" },
    { file: "Protótipo2_1.glb" },
  ];

  const viewer  = document.getElementById("viewer");
  const info    = document.getElementById("info");
  let activeBtn = document.querySelector(".sw-btn.active");

  function loadModel(index, btn) {
    const m = models[index];
    viewer.setAttribute("src", m.file);
    info.textContent = m.file;
    if (activeBtn) activeBtn.classList.remove("active");
    btn.classList.add("active");
    activeBtn = btn;
  }

  viewer.setAttribute("src", models[0].file);
</script>
</body>
</html>
